<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CustomIDE Cockpit</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function cockpitResetBootstrap() {
      const resetUrl = "../../state/cockpit_hard_reset_request.json";
      const resetNonceKey = "cockpit_hard_reset_last_nonce";

      function forceReload(nonce, reason) {
        try {
          localStorage.setItem(resetNonceKey, String(nonce));
        } catch (_err) {
          // Ignore storage failures.
        }
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("_hr", String(nonce));
        nextUrl.searchParams.set("_hrt", String(Date.now()));
        nextUrl.searchParams.set("_reason", String(reason || "requested"));
        window.location.replace(nextUrl.toString());
      }

      async function checkResetTrigger() {
        try {
          const res = await fetch(resetUrl + "?_=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          const payload = await res.json();
          const nonce = payload && payload.nonce ? String(payload.nonce) : "";
          if (!nonce) return;
          const lastNonce = String(localStorage.getItem(resetNonceKey) || "");
          if (nonce !== lastNonce) {
            forceReload(nonce, payload.reason || "requested");
          }
        } catch (_err) {
          // Keep boot lightweight and silent.
        }
      }

      checkResetTrigger();
      setInterval(checkResetTrigger, 5000);
    })();
  </script>
</head>
<body>
  <div class="bg-orbit"></div>

  <header class="topbar">
    <div class="brand">CustomIDE Cockpit</div>
    <div class="status" id="backendStatus">Backend: checking...</div>
    <div class="status" id="llmHealthBadge">LLM: checking...</div>
    <div class="status" id="syncHealthBadge">Sync: checking...</div>
    <div class="status" id="lastRefresh">Last refresh: --</div>
  </header>

  <main class="cockpit-grid">
    <section class="panel panel-live">
      <h3>Autopilot Live</h3>
      <pre id="autopilotSummary">waiting...</pre>
    </section>

    <section class="panel panel-events">
      <h3>Autopilot Events</h3>
      <div id="workerLogPanel" class="scroll-log"></div>
    </section>

    <section class="panel panel-git">
      <h3>Git Sync</h3>
      <pre id="gitPanel">waiting...</pre>
    </section>

    <section class="panel panel-cadence">
      <h3>Sync Cadence</h3>
      <pre id="syncCadencePanel">waiting...</pre>
    </section>

    <section class="panel panel-token">
      <h3>Token Counters</h3>
      <pre id="tokenPanel">waiting...</pre>
    </section>

    <section class="panel panel-ollama">
      <h3>Ollama / Cost Mode</h3>
      <pre id="ollamaPanel">waiting...</pre>
    </section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
