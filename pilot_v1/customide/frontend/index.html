<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>CustomIDE Cockpit</title>
  <link rel="stylesheet" href="css/style.alt-20260507c.css?v=14">
  <script>
    (function cockpitResetBootstrap() {
      const resetUrl = "../../state/cockpit_hard_reset_request.json";
      const resetNonceKey = "cockpit_hard_reset_last_nonce";

      function forceReload(nonce, reason) {
        try {
          localStorage.setItem(resetNonceKey, String(nonce));
        } catch (_err) {
          // Ignore storage failures.
        }
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("_hr", String(nonce));
        nextUrl.searchParams.set("_hrt", String(Date.now()));
        nextUrl.searchParams.set("_reason", String(reason || "requested"));
        window.location.replace(nextUrl.toString());
      }

      async function checkResetTrigger() {
        try {
          const res = await fetch(resetUrl + "?_=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          const payload = await res.json();
          const nonce = payload && payload.nonce ? String(payload.nonce) : "";
          if (!nonce) return;
          const lastNonce = String(localStorage.getItem(resetNonceKey) || "");
          if (nonce !== lastNonce) {
            forceReload(nonce, payload.reason || "requested");
          }
        } catch (_err) {
          // Keep boot lightweight and silent.
        }
      }

      checkResetTrigger();
      setInterval(checkResetTrigger, 5000);
    })();
  </script>
</head>
<body>
  <div class="bg-orbit"></div>

  <header class="topbar">
    <div class="brand">CustomIDE Cockpit</div>
    <div class="status" id="backendStatus">Backend: checking...</div>
    <div class="status" id="llmHealthBadge">LLM: checking...</div>
    <div class="status" id="syncHealthBadge">Sync: checking...</div>
    <div class="status" id="lastRefresh">Last refresh: --</div>
    <button id="analyzeCockpitBtn" class="ask-ai-btn ask-ai-btn-lg" title="Snapshot every pane and ask the AI engineer for a full health analysis">Analyze Cockpit</button>
  </header>

  <main class="cockpit-grid">
    <section class="panel panel-live">
      <h3>Autopilot Live <span class="panel-sub" id="taskHistoryCount"></span>
        <button class="ask-ai-btn" data-pane="autopilotLive" data-pane-label="Autopilot Live" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <div id="autopilotLive" class="scroll-log autopilot-live"></div>
    </section>

    <section class="panel panel-events">
      <h3>Autopilot Events <span class="panel-sub">(Worker 1)</span>
        <button class="ask-ai-btn" data-pane="workerLogPanel" data-pane-label="Autopilot Events" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <div id="workerLogPanel" class="scroll-log"></div>
    </section>

    <section class="panel panel-oploop">
      <h3>MTASK Stream <span class="panel-sub" id="mtaskStreamStatus">…</span>
        <button class="ask-ai-btn" data-pane="mtaskStreamPanel" data-pane-label="MTASK Stream" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <div id="mtaskStreamPanel" class="mtask-stream-list"></div>
    </section>

    <section class="panel panel-git">
      <h3>Git Sync
        <button class="ask-ai-btn" data-pane="gitPanel" data-pane-label="Git Sync" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <pre id="gitPanel">waiting...</pre>
    </section>

    <section class="panel panel-cadence">
      <h3>Sync Cadence
        <button class="ask-ai-btn" data-pane="syncCadencePanel" data-pane-label="Sync Cadence" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <pre id="syncCadencePanel">waiting...</pre>
    </section>

    <section class="panel panel-token">
      <h3>Token Counters
        <button class="ask-ai-btn" data-pane="tokenPanel" data-pane-label="Token Counters" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <pre id="tokenPanel">waiting...</pre>
    </section>

    <section class="panel panel-ollama">
      <h3>Ollama / Cost Mode
        <button class="ask-ai-btn" data-pane="ollamaPanel" data-pane-label="Ollama / Cost Mode" title="Ask the AI engineer about this pane">Ask AI</button>
      </h3>
      <pre id="ollamaPanel">waiting...</pre>
    </section>

    <section class="panel panel-chat" id="cockpitChat">
      <h3>
        <span id="chatChannelTitle">Cockpit AI</span>
        <span class="chat-model-tag" id="chatChannelTag">qwen2.5:14b</span>
        <button class="chat-tab-btn chat-tab-active" id="chatTabCockpit" title="Cockpit AI chat">Cockpit AI</button>
        <button class="chat-tab-btn" id="chatTabMessenger" title="Messenger chat">Messenger</button>
        <button class="chat-clear" id="chatClear" title="Clear chat">clr</button>
      </h3>
      <div class="chat-messages scroll-log" id="chatMessages">
        <div class="chat-msg chat-msg-ai">Ready.</div>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" class="chat-input" rows="2" placeholder="ask the cockpit AI..." maxlength="2000"></textarea>
        <button id="chatSend" class="chat-send-btn" title="Send">&gt;</button>
      </div>
    </section>

  </main>

  <script src="js/config.js?v=14"></script>
  <script src="js/app.js?v=14"></script>
</body>
</html>
